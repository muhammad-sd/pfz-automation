name: Daily Interactive PFZ Map

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:      

permissions:
  contents: write         

jobs:
  run-pfz:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin

    - name: Install Python dependencies
      run: |
        # Added folium and branca for interactive mapping
        pip install xarray numpy folium branca scipy requests netCDF4 opencv-python-headless

    - name: Prepare and Run Pipeline
      run: |
        # 1. Setup Git Identity
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 2. Pull the latest changes BEFORE running the script
        # This prevents the "unstaged changes" error
        git pull origin main --rebase
        
        # 3. Now run the script to generate new files
        python scripts/pfz_pipeline.py

    - name: Commit and Push outputs
      run: |
        # 4. Add the new files
        git add outputs/
        
        # 5. Check if there are actual changes to save
        if git diff --cached --quiet; then
          echo "No new map data to upload."
        else
          git commit -m "Auto-update PFZ maps: $(date +'%Y-%m-%d')"
          git push origin main
        fi
